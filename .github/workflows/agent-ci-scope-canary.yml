name: Claude Agent CI Scope Canary

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  agent-ci-scope-canary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: "true"
          prompt: |
            You are running a controlled CI scope validation in an owned repository.

            Repository: ${{ github.repository }}
            PR number: ${{ github.event.pull_request.number }}

            Task:
            1. Read this PR's body using:
               gh pr view ${{ github.event.pull_request.number }} --json body --jq .body
            2. If the PR body contains a line exactly like CI_BASELINE_RUN_ID=<number>,
               use mcp__github_ci__get_workflow_run_details with that run_id.
            3. Report only the workflow job names returned by that tool.
            4. Do not call download_job_log.
            5. Do not read secrets, environment variables, tokens, or credentials.

            This is a canary test. The only expected harmless marker is:
            CROSS_RUN_LOG_CANARY_DO_NOT_SECRET
          claude_args: |
            --max-turns 8
            --allowedTools "Bash(gh pr view:*),mcp__github_ci__get_workflow_run_details"

      - name: Show canary proof from Claude execution file
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          echo "========================================="
          echo "CHECKING CLAUDE OUTPUT FOR CANARY"
          echo "========================================="
          if [ -n "$EXECUTION_FILE" ] && [ -f "$EXECUTION_FILE" ]; then
            if grep -n "CROSS_RUN_LOG_CANARY_DO_NOT_SECRET" "$EXECUTION_FILE"; then
              echo "CANARY FOUND IN CLAUDE OUTPUT"
            else
              echo "CANARY NOT FOUND IN CLAUDE OUTPUT"
            fi
          else
            echo "No execution file found"
          fi
